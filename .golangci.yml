version: "2"
run:
  timeout: 5m
  build-tags:
    - sqlite_fts5
    - sqlite_math_functions
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - errcheck
    - misspell
  settings:
    errcheck:
      exclude-functions:
        - (*database/sql.Rows).Close
    misspell:
      locale: US
issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0