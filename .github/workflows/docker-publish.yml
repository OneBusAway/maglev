name: Docker
on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker-publish.yml'

permissions:
  contents: read
  packages: write

jobs:
  # Push to GHCR on every main branch commit; build-only on PRs
  buildx:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Check if build is needed
        id: check
        if: github.event_name == 'push'
        run: |
          LATEST_SHA=$(git ls-remote origin refs/heads/main | awk '{print $1}')
          if [ "${{ github.sha }}" != "$LATEST_SHA" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Build skipped — commit ${{ github.sha }} has been superseded by ${LATEST_SHA}."
          fi
      - name: Set up QEMU
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64
      - name: Set up Docker Buildx
        if: steps.check.outputs.skip != 'true'
        id: buildx
        uses: docker/setup-buildx-action@v3
      - name: Inspect builder
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "Name:      ${{ steps.buildx.outputs.name }}"
          echo "Endpoint:  ${{ steps.buildx.outputs.endpoint }}"
          echo "Status:    ${{ steps.buildx.outputs.status }}"
          echo "Flags:     ${{ steps.buildx.outputs.flags }}"
          echo "Platforms: ${{ steps.buildx.outputs.platforms }}"
      - name: Login to GitHub Container Registry
        if: steps.check.outputs.skip != 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push images
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/onebusaway/maglev:latest
            ghcr.io/onebusaway/maglev:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
